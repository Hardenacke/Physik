<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
<title id="title">Funktionsweise eines Kühlschranks</title>
<desc id="desc">Schematische Darstellung des Kältemittelkreislaufs mit Verdampfer, Kompressor, Verflüssiger und Drossel.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#e0f7ff"/><stop offset="0.45" stop-color="#f8fafc"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
  <linearGradient id="fridge" x1="0" x2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#e2e8f0"/></linearGradient>
  <linearGradient id="cold" x1="0" x2="1"><stop offset="0" stop-color="#67e8f9"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
  <linearGradient id="hot" x1="0" x2="1"><stop offset="0" stop-color="#fb923c"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#0284c7"/></marker>
  <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/></marker>
  <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/></marker>
</defs>
<rect width="1200" height="760" fill="url(#bg)"/>
<circle cx="1030" cy="130" r="120" fill="#fed7aa" opacity="0.35"/>
<circle cx="190" cy="640" r="180" fill="#bae6fd" opacity="0.45"/>

<g filter="url(#shadow)">
  <rect x="115" y="90" width="365" height="585" rx="38" fill="url(#fridge)" stroke="#94a3b8" stroke-width="5"/>
  <line x1="115" y1="315" x2="480" y2="315" stroke="#cbd5e1" stroke-width="5"/>
  <rect x="440" y="235" width="22" height="90" rx="10" fill="#94a3b8"/>
  <rect x="440" y="435" width="22" height="125" rx="10" fill="#94a3b8"/>
  <rect x="150" y="355" width="295" height="275" rx="24" fill="#dbeafe" opacity="0.78" stroke="#93c5fd" stroke-width="3"/>
  <g opacity="0.75">
    <circle cx="195" cy="400" r="18" fill="#60a5fa"/><circle cx="245" cy="450" r="13" fill="#38bdf8"/><circle cx="335" cy="510" r="16" fill="#60a5fa"/>
    <path d="M180 535 q60 -35 120 0 t120 0" fill="none" stroke="#0ea5e9" stroke-width="6" opacity="0.55"/>
  </g>
  <text x="155" y="140" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#0f172a">Kühlschrank</text>
  <text x="155" y="180" font-family="Arial, sans-serif" font-size="22" fill="#475569">innen kalt</text>
</g>

<g filter="url(#shadow)">
  <rect x="630" y="90" width="420" height="585" rx="34" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
  <text x="665" y="140" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Kältemittelkreislauf</text>
  <text x="665" y="175" font-family="Arial, sans-serif" font-size="20" fill="#64748b">Wärme wird nicht erzeugt, sondern transportiert.</text>
</g>

<g font-family="Arial, sans-serif" font-size="19" font-weight="700">
  <rect x="705" y="230" width="250" height="85" rx="22" fill="#dbeafe" stroke="#0284c7" stroke-width="4"/>
  <text x="733" y="263" fill="#075985">Verdampfer</text>
  <text x="733" y="292" font-size="16" font-weight="500" fill="#075985">nimmt Wärme innen auf</text>

  <rect x="735" y="420" width="210" height="90" rx="22" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="765" y="455" fill="#991b1b">Verflüssiger</text>
  <text x="765" y="482" font-size="16" font-weight="500" fill="#991b1b">gibt Wärme ab</text>

  <circle cx="620" cy="470" r="55" fill="#ffedd5" stroke="#f97316" stroke-width="5"/>
  <text x="573" y="463" fill="#9a3412">Kom-</text><text x="565" y="489" fill="#9a3412">pressor</text>

  <rect x="960" y="322" width="65" height="85" rx="18" fill="#fef9c3" stroke="#ca8a04" stroke-width="4"/>
  <text x="968" y="356" fill="#854d0e">Drossel</text>
  <text x="970" y="382" font-size="15" font-weight="500" fill="#854d0e">Druck ↓</text>
</g>

<path d="M705 272 C610 272 595 360 620 415" fill="none" stroke="#0284c7" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
<path d="M660 510 C720 575 875 570 910 510" fill="none" stroke="#dc2626" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowRed)"/>
<path d="M945 465 C1035 430 1040 350 1020 360" fill="none" stroke="#dc2626" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowRed)"/>
<path d="M960 332 C930 260 845 230 760 230" fill="none" stroke="#0284c7" stroke-width="12" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

<path d="M445 480 C560 480 620 265 705 265" fill="none" stroke="#0284c7" stroke-width="9" stroke-dasharray="16 12" marker-end="url(#arrowBlue)"/>
<text x="485" y="310" font-family="Arial, sans-serif" font-size="23" font-weight="800" fill="#0369a1">Wärme aus dem Innenraum</text>

<g>
  <path d="M775 610 C885 665 1010 625 1095 545" fill="none" stroke="#dc2626" stroke-width="10" marker-end="url(#arrowRed)"/>
  <text x="770" y="662" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#991b1b">Wärme an den Raum</text>
</g>
<g>
  <path d="M615 675 L615 535" fill="none" stroke="#16a34a" stroke-width="10" marker-end="url(#arrowGreen)"/>
  <rect x="500" y="665" width="230" height="56" rx="20" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="525" y="701" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#166534">elektrische Arbeit</text>
</g>

<g font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="#0f172a">
  <rect x="70" y="705" width="1060" height="38" rx="18" fill="#ffffff" opacity="0.8"/>
  <text x="100" y="731">Energiefluss: Wärme innen + elektrische Arbeit → Wärme außen</text>
</g>
</svg>