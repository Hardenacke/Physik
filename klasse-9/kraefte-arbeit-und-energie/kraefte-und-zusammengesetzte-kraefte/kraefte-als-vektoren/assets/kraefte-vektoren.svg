<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Kräfte als Pfeile darstellen">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="1" stop-color="#eef7f4"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
  <marker id="arrowB" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#167a65"/></marker>
</defs>
<rect width="1200" height="620" rx="34" fill="url(#bg)"/>
<rect x="35" y="30" width="1130" height="74" rx="22" fill="#167a65" opacity="0.96"/>
<text x="65" y="78" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="white">Kräfte als Pfeile darstellen</text>

<g filter="url(#shadow)"><rect x="85" y="145" width="1030" height="390" rx="28" fill="white"/></g>
<circle cx="600" cy="330" r="42" fill="#e0f2fe" stroke="#0f172a" stroke-width="8"/>
<line x1="600" y1="330" x2="305" y2="225" stroke="#f59e0b" stroke-width="13" marker-end="url(#arrow)"/>
<line x1="600" y1="330" x2="890" y2="210" stroke="#167a65" stroke-width="13" marker-end="url(#arrowB)"/>
<line x1="600" y1="330" x2="615" y2="505" stroke="#ef4444" stroke-width="13" marker-end="url(#arrow)"/>
<rect x="190" y="190" width="145" height="60" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="5"/><text x="218" y="230" font-size="24" font-family="Arial" fill="#0f172a">F₁</text>
<rect x="865" y="170" width="145" height="60" rx="16" fill="#f8fafc" stroke="#334155" stroke-width="5"/><text x="894" y="210" font-size="24" font-family="Arial" fill="#0f172a">F₂</text>
<rect x="625" y="485" width="180" height="60" rx="16" fill="#fff7ed" stroke="#ef4444" stroke-width="5"/><text x="648" y="525" font-size="24" font-family="Arial" fill="#0f172a">Resultierende</text>
<text x="150" y="580" font-size="25" font-family="Arial" fill="#334155">Ein Kraftpfeil zeigt Angriffspunkt, Richtung und Betrag. Die Länge steht für die Stärke der Kraft.</text>

</svg>