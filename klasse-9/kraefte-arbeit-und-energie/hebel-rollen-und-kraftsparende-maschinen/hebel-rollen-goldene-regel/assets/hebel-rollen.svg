<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Hebel, Rollen und Goldene Regel">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="1" stop-color="#eef7f4"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
  <marker id="arrowB" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#167a65"/></marker>
</defs>
<rect width="1200" height="620" rx="34" fill="url(#bg)"/>
<rect x="35" y="30" width="1130" height="74" rx="22" fill="#167a65" opacity="0.96"/>
<text x="65" y="78" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="white">Hebel, Rollen und Goldene Regel</text>

<g filter="url(#shadow)"><rect x="70" y="145" width="500" height="395" rx="28" fill="white"/><rect x="630" y="145" width="500" height="395" rx="28" fill="white"/></g>
<polygon points="300,355 350,460 250,460" fill="#94a3b8"/><rect x="130" y="320" width="360" height="35" rx="10" fill="#f59e0b" stroke="#92400e" stroke-width="5"/>
<circle cx="230" cy="337" r="30" fill="#60a5fa"/><circle cx="435" cy="337" r="48" fill="#ef4444"/>
<line x1="230" y1="337" x2="230" y2="245" stroke="#334155" stroke-width="7"/><line x1="435" y1="337" x2="435" y2="245" stroke="#334155" stroke-width="7"/>
<text x="140" y="500" font-size="24" font-family="Arial" fill="#0f172a">Kleiner Körper weiter außen kann ausgleichen.</text>
<circle cx="875" cy="250" r="65" fill="#e0f2fe" stroke="#0f172a" stroke-width="8"/><circle cx="875" cy="250" r="18" fill="#0f172a"/>
<path d="M875 185 L875 430" stroke="#334155" stroke-width="9" fill="none"/><rect x="805" y="430" width="140" height="65" rx="14" fill="#f59e0b" stroke="#92400e" stroke-width="6"/>
<path d="M875 185 C1000 200, 1020 300, 985 420" stroke="#167a65" stroke-width="10" fill="none" marker-end="url(#arrowB)"/>
<text x="690" y="500" font-size="24" font-family="Arial" fill="#0f172a">Rollen ändern Kraft und Zugweg.</text>

</svg>