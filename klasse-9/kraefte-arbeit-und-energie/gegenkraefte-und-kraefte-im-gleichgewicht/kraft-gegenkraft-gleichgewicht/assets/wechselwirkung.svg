<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="Kraft und Gegenkraft">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f7fbff"/><stop offset="1" stop-color="#eef7f4"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/></filter>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#f59e0b"/></marker>
  <marker id="arrowB" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,5 L0,10 Z" fill="#167a65"/></marker>
</defs>
<rect width="1200" height="620" rx="34" fill="url(#bg)"/>
<rect x="35" y="30" width="1130" height="74" rx="22" fill="#167a65" opacity="0.96"/>
<text x="65" y="78" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="700" fill="white">Kraft und Gegenkraft</text>

<g filter="url(#shadow)"><rect x="80" y="150" width="1040" height="390" rx="28" fill="white"/></g>
<rect x="250" y="285" width="210" height="70" rx="18" fill="#dbeafe" stroke="#1e3a8a" stroke-width="6"/>
<rect x="740" y="285" width="210" height="70" rx="18" fill="#dcfce7" stroke="#14532d" stroke-width="6"/>
<line x1="460" y1="320" x2="740" y2="320" stroke="#475569" stroke-width="10"/>
<line x1="500" y1="250" x2="710" y2="250" stroke="#f59e0b" stroke-width="12" marker-end="url(#arrow)"/>
<line x1="700" y1="390" x2="490" y2="390" stroke="#167a65" stroke-width="12" marker-end="url(#arrowB)"/>
<text x="290" y="330" font-size="26" font-family="Arial" font-weight="700" fill="#0f172a">Körper A</text><text x="780" y="330" font-size="26" font-family="Arial" font-weight="700" fill="#0f172a">Körper B</text>
<text x="515" y="230" font-size="26" font-family="Arial" fill="#0f172a">A wirkt auf B</text><text x="520" y="430" font-size="26" font-family="Arial" fill="#0f172a">B wirkt auf A</text>
<text x="145" y="500" font-size="25" font-family="Arial" fill="#334155">Kraft und Gegenkraft sind gleich groß, wirken aber an verschiedenen Körpern.</text>

</svg>