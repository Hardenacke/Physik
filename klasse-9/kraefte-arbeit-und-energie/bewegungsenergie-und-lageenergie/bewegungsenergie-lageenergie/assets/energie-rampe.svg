<rect x="850" y="225" width="55" height="220" rx="10" fill="#10b981"/><rect x="925" y="300" width="55" height="145" rx="10" fill="#f59e0b"/><rect x="1000" y="375" width="55" height="70" rx="10" fill="#ef4444"/>
