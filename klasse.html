<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physik · Materialien</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero compact">
    <div class="hero-content">
      <p class="eyebrow" id="klasseEyebrow">Physik</p>
      <h1 id="klasseTitel">Materialübersicht</h1>
      <p class="subtitle" id="klasseBeschreibung">Wähle ein Thema aus und öffne das Material.</p>
      <div class="toolbar two-col">
        <input id="topicSearch" class="search-input" type="search" placeholder="In dieser Stufe suchen …">
        <select id="bereichFilter" class="select-input" aria-label="Inhaltsfeld filtern">
          <option value="">Alle Bereiche</option>
        </select>
      </div>
    </div>
  </header>

  <main class="page">
    <nav class="breadcrumb">
      <a href="index.html">Startseite</a>
      <span id="breadcrumbKlasse">Klasse</span>
    </nav>

    <section class="panel">
      <div class="section-heading">
        <div>
          <p class="eyebrow dark">Materialien</p>
          <h2 id="materialHeadline">Themen</h2>
        </div>
        <a class="ghost-button" href="index.html">Alle Stufen anzeigen</a>
      </div>
      <div class="material-list" id="materialListe" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const klasseId = params.get('klasse') || params.get('k') || params.get('id') || 'klasse-5';
    const materialListe = document.getElementById('materialListe');
    const searchInput = document.getElementById('topicSearch');
    const filterSelect = document.getElementById('bereichFilter');
    let data = null;
    let klasse = null;
    let materialien = [];

    fetch('data.json')
      .then(response => {
        if (!response.ok) throw new Error('data.json konnte nicht geladen werden.');
        return response.json();
      })
      .then(json => {
        data = json;
        klasse = data.klassen.find(item => item.id === klasseId) || data.klassen[0];
        materialien = data.materialien?.[klasse.id] || [];
        setupHeader();
        setupFilter();
        renderMaterialien();
      })
      .catch(error => {
        materialListe.innerHTML = `<article class="material-card error-card"><h3>Fehler beim Laden</h3><p>${error.message}</p></article>`;
      });

    function setupHeader() {
      document.title = `Physik · ${klasse.titel}`;
      document.getElementById('klasseEyebrow').textContent = `Physik · ${klasse.kurz || klasse.titel}`;
      document.getElementById('klasseTitel').textContent = klasse.titel;
      document.getElementById('klasseBeschreibung').textContent = klasse.beschreibung || 'Materialübersicht';
      document.getElementById('breadcrumbKlasse').textContent = klasse.titel;
      document.getElementById('materialHeadline').textContent = `${materialien.length} ${materialien.length === 1 ? 'Material' : 'Materialien'}`;
    }

    function setupFilter() {
      const bereiche = [...new Set(materialien.map(item => item.bereich))];
      filterSelect.innerHTML = '<option value="">Alle Bereiche</option>' + bereiche.map(bereich => `<option value="${bereich}">${bereich}</option>`).join('');
    }

    function renderMaterialien() {
      const term = searchInput.value.trim().toLowerCase();
      const bereich = filterSelect.value;
      const filtered = materialien.filter(item => {
        const matchesBereich = !bereich || item.bereich === bereich;
        const haystack = [item.titel, item.bereich, item.typ, item.pfad, ...(item.tags || [])].join(' ').toLowerCase();
        return matchesBereich && (!term || haystack.includes(term));
      });
      materialListe.innerHTML = filtered.length ? filtered.map(renderMaterial).join('') : '<p>Keine passenden Materialien gefunden.</p>';
    }

    function renderMaterial(item) {
      const tags = (item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
      return `
        <article class="material-card">
          <div class="material-main">
            <p class="eyebrow dark">${item.bereich} · ${item.typ || 'Material'}</p>
            <h3>${item.titel}</h3>
            <p class="path-text">${item.pfad}</p>
            <div class="tag-row">${tags}</div>
          </div>
          <a class="primary-link" href="${item.pfad}">Material öffnen</a>
        </article>`;
    }

    searchInput.addEventListener('input', renderMaterialien);
    filterSelect.addEventListener('change', renderMaterialien);
  </script>
</body>
</html>
