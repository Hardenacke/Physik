<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Physik · Klasse öffnen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero compact"><div class="hero-content"><div class="breadcrumb"><a href="index.html">Startseite</a><span>›</span><span>Auswahl</span></div><h1>Klasse oder Kurs öffnen</h1><p class="subtitle">Diese Kompatibilitätsseite leitet alte Links wie <code>klasse.html?klasse=klasse-8</code> auf die neue Ordnernavigation weiter.</p></div></header>
<main class="page"><section class="panel"><h2>Auswahl</h2><p>Wähle eine Klasse oder einen Kurs.</p><div class="toolbar"><select class="select" id="k"><option value="klasse-5">Klasse 5</option><option value="klasse-8">Klasse 8</option><option value="klasse-9">Klasse 9</option><option value="klasse-10">Klasse 10</option><option value="ef">EF</option><option value="q1-q2-grundkurs">Q1/Q2 Grundkurs</option><option value="q1-q2-leistungskurs">Q1/Q2 Leistungskurs</option></select><button class="primary" id="go">Öffnen</button></div></section></main>
<script>
const params=new URLSearchParams(location.search);const id=params.get('klasse');
if(id) location.replace(id+'/index.html');
document.getElementById('go').addEventListener('click',()=>location.href=document.getElementById('k').value+'/index.html');
</script>

</body>
</html>
