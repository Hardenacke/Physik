<rect x="42" y="38" width="816" height="58" rx="18" fill="#eef7fa" opacity="1"/><text x="66" y="68" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800" fill="#0a2540" text-anchor="start" dominant-baseline="middle">Momentan- und Durchschnittsgeschwindigkeit</text><line x1="42" y1="112" x2="858" y2="112" stroke="#22c7d6" stroke-width="4" stroke-linecap="round" opacity="1"/><circle cx="260" cy="290" r="125" fill="#f6f8fa" stroke="#0a2540" stroke-width="6" opacity="1"/><path d="M 170 330 A 105 105 0 0 1 350 330" fill="none" stroke="#cbd8e1" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="1"/><line x1="260" y1="290" x2="330" y2="230" stroke="#ef5b5b" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)" opacity="1"/><text x="260" y="360" font-family="Arial,Helvetica,sans-serif" font-size="27" font-weight="900" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">82 km/h</text><text x="260" y="430" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="750" fill="#5d6b78" text-anchor="middle" dominant-baseline="middle">Tachometer: jetzt</text><rect x="515" y="190" width="255" height="180" rx="20" fill="#eef7fa" stroke="#22c7d6" stroke-width="3" opacity="1"/><text x="642" y="235" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="700" fill="#5d6b78" text-anchor="middle" dominant-baseline="middle">Gesamtstrecke</text><text x="642" y="275" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="900" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">120 km</text><text x="642" y="320" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="800" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Gesamtzeit 2 h</text><text x="642" y="410" font-family="Arial,Helvetica,sans-serif" font-size="28" font-weight="900" fill="#2fbf71" text-anchor="middle" dominant-baseline="middle">Ø 60 km/h</text>
