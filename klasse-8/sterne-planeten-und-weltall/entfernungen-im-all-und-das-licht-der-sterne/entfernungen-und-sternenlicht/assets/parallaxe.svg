<rect x="42" y="38" width="816" height="58" rx="18" fill="#f0eeff" opacity="1"/><text x="66" y="68" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800" fill="#0a2540" text-anchor="start" dominant-baseline="middle">Entfernungsmessung durch Parallaxe</text><line x1="42" y1="112" x2="858" y2="112" stroke="#7257d5" stroke-width="4" stroke-linecap="round" opacity="1"/><circle cx="450" cy="170" r="20" fill="#f4c95d" opacity="1"/><circle cx="300" cy="420" r="15" fill="#2f80ed" opacity="1"/><circle cx="600" cy="420" r="15" fill="#2f80ed" opacity="1"/><line x1="300" y1="420" x2="450" y2="170" stroke="#22c7d6" stroke-width="4" stroke-linecap="round" opacity="1"/><line x1="600" y1="420" x2="450" y2="170" stroke="#f4c95d" stroke-width="4" stroke-linecap="round" opacity="1"/><line x1="300" y1="420" x2="600" y2="420" stroke="#0a2540" stroke-width="4" stroke-linecap="round" opacity="1"/><text x="450" y="455" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="800" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Basislinie</text><text x="450" y="130" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="800" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">naher Stern</text><text x="235" y="390" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="700" fill="#5d6b78" text-anchor="middle" dominant-baseline="middle">Position 1</text><text x="665" y="390" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="700" fill="#5d6b78" text-anchor="middle" dominant-baseline="middle">Position 2</text><circle cx="150" cy="170" r="4" fill="#5d6b78" opacity="1"/><circle cx="760" cy="170" r="4" fill="#5d6b78" opacity="1"/><text x="450" y="485" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="750" fill="#5d6b78" text-anchor="middle" dominant-baseline="middle">Je größer die scheinbare Verschiebung, desto näher ist der Stern.</text>
