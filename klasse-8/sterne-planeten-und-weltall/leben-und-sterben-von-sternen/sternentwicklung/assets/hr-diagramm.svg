<rect x="18" y="18" width="864" height="484" rx="24" fill="white" stroke="#7257d5" stroke-width="3" opacity=".98"/>
<rect x="42" y="38" width="816" height="58" rx="18" fill="#f0eeff" opacity="1"/><text x="66" y="68" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800" fill="#0a2540" text-anchor="start" dominant-baseline="middle">Vereinfachtes Hertzsprung-Russell-Diagramm</text><line x1="42" y1="112" x2="858" y2="112" stroke="#7257d5" stroke-width="4" stroke-linecap="round" opacity="1"/><line x1="120" y1="420" x2="800" y2="420" stroke="#0a2540" stroke-width="4" stroke-linecap="round" opacity="1"/><line x1="120" y1="420" x2="120" y2="145" stroke="#0a2540" stroke-width="4" stroke-linecap="round" opacity="1"/><path d="M 170 170 L 720 380" fill="none" stroke="#b7a7f4" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/><circle cx="260" cy="210" r="16" fill="#9ed0ff" opacity="1"/><circle cx="450" cy="285" r="16" fill="#fff2a8" opacity="1"/><circle cx="660" cy="360" r="16" fill="#ff9f7d" opacity="1"/><circle cx="680" cy="185" r="28" fill="#ef5b5b" opacity="1"/><circle cx="225" cy="375" r="12" fill="white" stroke="#0a2540" stroke-width="2" opacity="1"/><text x="75" y="155" font-family="Arial,Helvetica,sans-serif" font-size="17" font-weight="750" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Leuchtkraft ↑</text><text x="460" y="465" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="750" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">heiß  ←  Temperatur  →  kühl</text><text x="520" y="250" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="800" fill="#7257d5" text-anchor="middle" dominant-baseline="middle">Hauptreihe</text><text x="690" y="135" font-family="Arial,Helvetica,sans-serif" font-size="18" font-weight="800" fill="#ef5b5b" text-anchor="middle" dominant-baseline="middle">Riesen</text><text x="215" y="405" font-family="Arial,Helvetica,sans-serif" font-size="15" font-weight="700" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Weiße Zwerge</text>
