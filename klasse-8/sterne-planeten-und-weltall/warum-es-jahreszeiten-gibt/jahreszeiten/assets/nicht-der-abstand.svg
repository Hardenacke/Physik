<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
<title id="title">Jahreszeiten nicht durch Entfernung</title><desc id="desc">Klare schulische Physikgrafik: Jahreszeiten nicht durch Entfernung</desc>
<defs>
 <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,4 L0,8 z" fill="context-stroke"/></marker>
 <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#102a43" flood-opacity=".12"/></filter>
 <linearGradient id="rainbow" x1="0" x2="1"><stop offset="0" stop-color="#6d28d9"/><stop offset=".18" stop-color="#2563eb"/><stop offset=".35" stop-color="#0ea5e9"/><stop offset=".52" stop-color="#22c55e"/><stop offset=".68" stop-color="#facc15"/><stop offset=".83" stop-color="#f97316"/><stop offset="1" stop-color="#ef4444"/></linearGradient>
 <radialGradient id="sun"><stop offset="0" stop-color="#fff7a8"/><stop offset=".7" stop-color="#ffd34e"/><stop offset="1" stop-color="#f39a24"/></radialGradient>
</defs>
<rect width="900" height="520" rx="28" fill="#f3f6ff"/>
<rect x="18" y="18" width="864" height="484" rx="24" fill="white" stroke="#7257d5" stroke-width="3" opacity=".98"/>
<rect x="42" y="38" width="816" height="58" rx="18" fill="#f0eeff" opacity="1"/><text x="66" y="68" font-family="Arial,Helvetica,sans-serif" font-size="30" font-weight="800" fill="#0a2540" text-anchor="start" dominant-baseline="middle">Nicht der Abstand verursacht die Jahreszeiten</text><line x1="42" y1="112" x2="858" y2="112" stroke="#7257d5" stroke-width="4" stroke-linecap="round" opacity="1"/><circle cx="450" cy="275" r="55" fill="url(#sun)" opacity="1"/><ellipse cx="450" cy="275" rx="280" ry="135" fill="none" stroke="#cbd8e1" stroke-width="4" opacity="1"/><circle cx="180" cy="275" r="32" fill="#2f80ed" opacity="1"/><circle cx="720" cy="275" r="32" fill="#2f80ed" opacity="1"/><text x="180" y="340" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="750" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Winter im Norden</text><text x="720" y="340" font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="750" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Sommer im Norden</text><line x1="135" y1="150" x2="765" y2="390" stroke="#ef5b5b" stroke-width="10" stroke-linecap="round" opacity="1"/><line x1="135" y1="390" x2="765" y2="150" stroke="#ef5b5b" stroke-width="10" stroke-linecap="round" opacity="1"/><text x="450" y="455" font-family="Arial,Helvetica,sans-serif" font-size="21" font-weight="850" fill="#0a2540" text-anchor="middle" dominant-baseline="middle">Entscheidend sind Achsneigung, Sonnenstand und Tageslänge.</text>
</svg>